<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Personal - Diego Toledo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="inicio">
        <div class="contenedor">
            <div class="logo-sitio">
                <img src="img/logo.png" alt="Logo del portafolio" width="50" height="50">
                <span>Diego Toledo</span>
            </div>

            <nav>
                <a href="#inicio">Inicio</a>
                <a href="#sobre-mi">Sobre mí</a>
                <a href="#habilidades">Habilidades</a>
                <a href="#proyectos">Proyectos</a>
                <a href="#contacto">Contacto</a>
            </nav>
        </div>

        <div class="presentacion contenedor">
            <div class="texto-presentacion">
                <h1>Hola, soy Diego Toledo</h1>
                <p class="subtitulo">Estudiante de Ingeniería en Ciberseguridad</p>
                <p>
                    Me interesa aprender a crear páginas web modernas,
                    ordenadas y funcionales, aplicando conocimientos
                    de HTML y CSS.
                </p>
            </div>

            <div class="imagen-presentacion">
                <img src="img/perfil.jpg" alt="Foto de perfil de Diego Toledo" width="220" height="220">
            </div>
        </div>
    </header>

</body>
</html>
